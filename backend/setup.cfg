[flake8]
max-line-length = 120
exclude = 
    .git,
    __pycache__,
    .venv,
    venv,
    migrations,
    .env,
    .env.*,
    node_modules
ignore = 
    E203,
    E266,
    E501,
    W503,
    F403,
    F401
max-complexity = 10

[isort]
profile = django
line_length = 120
skip_glob = */migrations/*
known_django = django
known_first_party = apps

[tool:pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = tests.py test_*.py *_tests.py
addopts = --cov=. --cov-report=html --cov-report=term-missing
