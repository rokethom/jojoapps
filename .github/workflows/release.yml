name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Generate changelog
      id: changelog
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        if [ -z "$PREV_TAG" ]; then
          CHANGELOG=$(git log --oneline --format="- %s (%h)" | head -20)
        else
          CHANGELOG=$(git log $PREV_TAG..$TAG --oneline --format="- %s (%h)")
        fi
        
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref_name }}
        body: |
          ## Changes in ${{ github.ref_name }}
          
          ${{ steps.changelog.outputs.changelog }}
          
          ## Docker Images
          - Backend: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}`
          - Admin Frontend: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend-admin:${{ github.ref_name }}`
          - Customer Frontend: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend-customer:${{ github.ref_name }}`
          - Driver Frontend: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend-driver:${{ github.ref_name }}`
          - Nginx: `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-nginx:${{ github.ref_name }}`
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
