name: Scheduled Tasks

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Check for outdated Python dependencies
      run: |
        pip install pip-audit
        pip-audit --fix --skip-editable || true
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Check for outdated Node dependencies
      run: |
        npm audit --audit-level=low || true
    
    - name: Commit and push updates
      if: success()
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add -A
        if git diff-index --quiet HEAD --; then
          echo "No dependency updates available"
        else
          git commit -m "chore: update dependencies"
          git push origin main || true
        fi

  docker-cleanup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Delete untagged images
      uses: actions/github-script@v7
      with:
        script: |
          const registryUrl = 'ghcr.io';
          const packages = await github.rest.packages.listPackagesForAuthenticatedUser({
            package_type: 'container',
            exclude_draft: true
          });
          
          for (const pkg of packages.data) {
            console.log(`Found package: ${pkg.name}`);
          }

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy filesystem scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
    
    - name: Run Trivy config scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'config'
        scan-ref: '.'
        format: 'table'
        exit-code: '0'
