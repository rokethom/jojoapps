name: CI - Tests & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_jojango
          POSTGRES_USER: jojango
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-django pytest-cov flake8 black isort
    
    - name: Create .env file for testing
      run: |
        cat > backend/.env << EOF
        DEBUG=False
        SECRET_KEY=test-secret-key-${{ github.run_id }}
        DATABASE_URL=postgresql://jojango:testpass@localhost:5432/test_jojango
        REDIS_URL=redis://localhost:6379/0
        ALLOWED_HOSTS=localhost,127.0.0.1,testserver
        ENVIRONMENT=test
        EOF
    
    - name: Run Django migrations
      working-directory: backend
      run: |
        python manage.py migrate --settings=core.settings
    
    - name: Run backend tests
      working-directory: backend
      run: |
        pytest --cov=. --cov-report=xml --cov-report=html -v || true
    
    - name: Run linting (flake8)
      working-directory: backend
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting (black)
      working-directory: backend
      run: black --check . --diff || true
    
    - name: Check import sorting (isort)
      working-directory: backend
      run: isort --check-only . --diff || true
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

  frontend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        frontend: [ frontend-admin, frontend-customer, frontend-driver ]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: '${{ matrix.frontend }}/package-lock.json'
    
    - name: Install dependencies
      working-directory: ${{ matrix.frontend }}
      run: npm ci
    
    - name: Run linting
      working-directory: ${{ matrix.frontend }}
      run: npm run lint || true
    
    - name: Build
      working-directory: ${{ matrix.frontend }}
      run: npm run build
    
    - name: Run tests
      working-directory: ${{ matrix.frontend }}
      run: npm test -- --coverage --watchAll=false || true

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run SonarCloud scan (optional)
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONARCLOUD_TOKEN: ${{ secrets.SONARCLOUD_TOKEN }}
      if: vars.ENABLE_SONARCLOUD == 'true'

  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
