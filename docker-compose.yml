version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: jojangocms
      POSTGRES_USER: jojango_user
      POSTGRES_PASSWORD: jojango_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jojango_user -d jojangocms"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and WebSocket
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://jojango_user:jojango_password@db:5432/jojangocms
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/staticfiles:/app/staticfiles
      - ./backend/media:/app/media
    ports:
      - "8000:8000"

  # Admin Frontend
  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: ../Dockerfile.frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000/api}
    ports:
      - "3001:3000"

  # Customer Frontend
  frontend-customer:
    build:
      context: ./frontend-customer
      dockerfile: ../Dockerfile.frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000/api}
    ports:
      - "3002:3000"

  # Driver Frontend
  frontend-driver:
    build:
      context: ./frontend-driver
      dockerfile: ../Dockerfile.frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000/api}
    ports:
      - "3003:3000"

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
    depends_on:
      - backend
      - frontend-admin
      - frontend-customer
      - frontend-driver

volumes:
  postgres_data:
  redis_data: